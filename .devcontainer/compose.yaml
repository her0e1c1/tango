x-dev: &dev
  image: ghcr.io/her0e1c1/tango
  build:
    context: ..
  stdin_open: true
  tty: true
  environment:
    VITE_DB_HOST: db
    VITE_DB_PORT: ${VITE_DB_PORT:-8080}
  working_dir: /workspace
  volumes:
    - ..:/workspace:cached
    - node_modules:/workspace/node_modules
  entrypoint: bash

services:
  db:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    platform: linux/amd64
    init: true
    entrypoint: gcloud
    command: emulators firestore start --host-port "0.0.0.0:${VITE_DB_PORT:-8080}" --rules=/firestore.rules
    volumes:
      - ../firestore.rules:/firestore.rules
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${VITE_DB_PORT:-8080}"]
      start_period: 5s
      interval: 60s
      retries: 3

  # Keep container port 9099 and demo-tango aligned with firebase.json and .env.dev.
  auth:
    <<: *dev
    init: true
    entrypoint: []
    command:
      - firebase
      - emulators:start
      - --only
      - auth
      - --project
      - demo-tango
      - --config
      - firebase.json
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:9099', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      start_period: 5s
      interval: 1s
      retries: 60

  dev:
    <<: *dev
    profiles:
      - dev
    entrypoint: []
    command: sleep infinity

  app:
    <<: *dev
    init: true
    depends_on:
      db:
        condition: service_healthy
    command: -lc "npx vite dev --host 0.0.0.0 --port 4173"
    networks:
      default:
        aliases:
          - app.test
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4173', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      start_period: 5s
      interval: 1s
      retries: 60

volumes:
  node_modules:
