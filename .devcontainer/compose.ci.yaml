# CI copies .env.ci to .env before running this compose stack.
# Compose reads .env for variable expansion; this override maps the CI values
# needed by each service into container environment variables.
services:
  app:
    environment:
      VITE_PROJECT_ID: ${VITE_PROJECT_ID}
      VITE_WEB_API_KEY: ${VITE_WEB_API_KEY}
  dev:
    environment:
      PLAYWRIGHT_BASE_URL: ${PLAYWRIGHT_BASE_URL}
      PW_TEST_CONNECT_WS_ENDPOINT: ${PW_TEST_CONNECT_WS_ENDPOINT}
