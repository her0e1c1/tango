services:
  browser:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    init: true
    user: pwuser
    working_dir: /home/pwuser
    ports:
      - "3000:3000"
    command: /bin/sh -c "npx -y playwright@1.61.1 run-server --port 3000 --host 0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      start_period: 5s
      interval: 1s
      retries: 60

  app:
    image: ghcr.io/her0e1c1/tango
    build:
      context: .
    stdin_open: true
    tty: true
    env_file:
      - .env.e2e
    environment:
      VITE_DB_HOST: db
      VITE_DB_PORT: ${VITE_DB_PORT:-8080}
    working_dir: /workspace
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    entrypoint: bash
    command: -lc "npx vite dev --host 0.0.0.0 --port 4173"
    networks:
      default:
        aliases:
          - app.test
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4173', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      start_period: 5s
      interval: 1s
      retries: 60
